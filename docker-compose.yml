version: '3.8'

services:
  # Servicio de la página web (PHP)
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  # Servicio de la base de datos (MySQL)
  db:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: devioz_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
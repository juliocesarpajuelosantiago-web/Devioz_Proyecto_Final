version: '3.8'

services:
  # Servicio de la página web (PHP)
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  # Servicio de la base de datos (MySQL)
  db:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_DATABASE: devioz_db
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"

  # Servicio Grafana
  grafana:
    image: grafana/grafana
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: julio2001
      GF_SECURITY_ADMIN_PASSWORD: pajuelo69_
    ports:
      - "3000:3000"

  # Servicio Prometheus
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
  
# Servicio Node Exporter
  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"